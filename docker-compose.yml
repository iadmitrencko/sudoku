name: sudoku

services:
  php:
    build:
      context: .
      dockerfile: env/php/Dockerfile
    container_name: sudoku_php
    volumes:
      - .:/var/www/html
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: sudoku_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./env/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    container_name: sudoku_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped
